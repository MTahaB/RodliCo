# Phase 3+ — omniscient adaptive attack (the stress test for robust aggregators).
# `min_max` (Shejwalkar & Houmansadr) crafts a colluding malicious update that stays inside
# the honest cloud, so distance/clustering defenses (Krum) see nothing anomalous. Switch to
# `alie` (Baruch et al.) for the per-coordinate std-shift variant.
seed: 0
device: auto
seq_len: 128
batch_size: 32

n_workers: 8
iid: true
H: 125
outer_rounds: 40
inner_lr: 1.0e-3
outer_lr: 0.7
outer_momentum: 0.9
weight_decay: 0.1
grad_clip: 1.0

aggregator: krum          # the aggregator under test; sweep against the defense set
aggregator_kwargs:
  n_byzantine: 2
attack: min_max           # {min_max, alie}
attack_z: 1.5             # ALIE deviation multiplier (unused by min_max)
n_byzantine: 2

eval_every: 5
eval_batches: 20
out_dir: outputs/attack_adaptive_minmax
model:
  d_model: 384
  n_layers: 6
  n_heads: 6
  max_seq_len: 128
